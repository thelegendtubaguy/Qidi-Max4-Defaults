name: Check QIDI Max 4 Firmware

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      current_version:
        description: "Override current firmware version"
        required: false
        type: string
      download_package:
        description: "Download package when update is available"
        required: false
        default: false
        type: boolean
      publish_release:
        description: "Create a GitHub release when update is available"
        required: false
        default: false
        type: boolean

jobs:
  check-firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      need_update: ${{ steps.parse.outputs.need_update }}
      current_version: ${{ steps.current_version.outputs.current_version }}
      version: ${{ steps.parse.outputs.version }}
      url: ${{ steps.parse.outputs.url }}
      description: ${{ steps.parse.outputs.description }}
      apk_size: ${{ steps.parse.outputs.apk_size }}
      is_force: ${{ steps.parse.outputs.is_force }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_exists: ${{ steps.release_check.outputs.exists }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load firmware check settings
        id: settings
        run: |
          SETTINGS_FILE=".github/qidi_max4_firmware_check.json"
          DEFAULT_CURRENT_VERSION=$(jq -r '.current_version' "$SETTINGS_FILE")
          HARDWARE=$(jq -r '.hardware' "$SETTINGS_FILE")
          DEVICE_TYPE=$(jq -r '.device_type' "$SETTINGS_FILE")
          REGION=$(jq -r '.region' "$SETTINGS_FILE")
          VERSION_HEADER=$(jq -r '.version_header' "$SETTINGS_FILE")
          ACCEPT_LANGUAGE=$(jq -r '.accept_language' "$SETTINGS_FILE")
          TIMEZONE=$(jq -r '.timezone' "$SETTINGS_FILE")
          PLATFORM=$(jq -r '.platform' "$SETTINGS_FILE")
          USER_AGENT=$(jq -r '.user_agent' "$SETTINGS_FILE")

          echo "default_current_version=$DEFAULT_CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "hardware=$HARDWARE" >> "$GITHUB_OUTPUT"
          echo "device_type=$DEVICE_TYPE" >> "$GITHUB_OUTPUT"
          echo "region=$REGION" >> "$GITHUB_OUTPUT"
          echo "version_header=$VERSION_HEADER" >> "$GITHUB_OUTPUT"
          echo "accept_language=$ACCEPT_LANGUAGE" >> "$GITHUB_OUTPUT"
          echo "timezone=$TIMEZONE" >> "$GITHUB_OUTPUT"
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "user_agent=$USER_AGENT" >> "$GITHUB_OUTPUT"

      - name: Resolve current version baseline
        id: current_version
        uses: actions/github-script@v8
        env:
          DEFAULT_CURRENT_VERSION: ${{ steps.settings.outputs.default_current_version }}
          INPUT_CURRENT_VERSION: ${{ inputs.current_version }}
          RELEASE_TAG_PREFIX: qidi-max4-firmware-
        with:
          script: |
            const inputVersion = process.env.INPUT_CURRENT_VERSION?.trim();
            if (inputVersion) {
              core.setOutput('current_version', inputVersion);
              core.setOutput('source', 'workflow_dispatch');
              return;
            }

            const configuredVersion = process.env.DEFAULT_CURRENT_VERSION?.trim();
            const prefix = process.env.RELEASE_TAG_PREFIX;

            const compareVersions = (left, right) => {
              const leftParts = left.split('.').map((part) => Number.parseInt(part, 10) || 0);
              const rightParts = right.split('.').map((part) => Number.parseInt(part, 10) || 0);
              const length = Math.max(leftParts.length, rightParts.length);

              for (let index = 0; index < length; index += 1) {
                const difference = (leftParts[index] || 0) - (rightParts[index] || 0);
                if (difference !== 0) {
                  return difference;
                }
              }

              return 0;
            };

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            let latestReleaseVersion = '';
            for (const release of releases) {
              if (!release.tag_name?.startsWith(prefix)) {
                continue;
              }

              const version = release.tag_name.slice(prefix.length);
              if (!latestReleaseVersion || compareVersions(version, latestReleaseVersion) > 0) {
                latestReleaseVersion = version;
              }
            }

            let resolvedVersion = configuredVersion;
            let source = 'settings';

            if (latestReleaseVersion && (!configuredVersion || compareVersions(latestReleaseVersion, configuredVersion) > 0)) {
              resolvedVersion = latestReleaseVersion;
              source = 'latest_release';
            }

            if (!resolvedVersion) {
              core.setFailed('Unable to determine current firmware version');
              return;
            }

            core.setOutput('current_version', resolvedVersion);
            core.setOutput('source', source);

      - name: Query firmware endpoint
        id: query
        env:
          QIDI_MAX4_DEVICE_ID_SECRET: ${{ secrets.QIDI_MAX4_DEVICE_ID }}
        run: |
          if [ -z "$QIDI_MAX4_DEVICE_ID_SECRET" ]; then
            echo "Missing secret QIDI_MAX4_DEVICE_ID" >&2
            exit 1
          fi

          echo "::add-mask::$QIDI_MAX4_DEVICE_ID_SECRET"
          QIDI_MAX4_DEVICE_ID=$(printf '%s' "$QIDI_MAX4_DEVICE_ID_SECRET" | tr '[:lower:]' '[:upper:]')
          unset QIDI_MAX4_DEVICE_ID_SECRET
          echo "::add-mask::$QIDI_MAX4_DEVICE_ID"

          # Mirror the embedded client's non-empty HMAC signature generation.
          QIDI_MAX4_SIGNATURE=$(printf '%s' 'qidi3d null' | openssl dgst -sha256 -hmac 'qid3d-from-2025-CAFE-BABE' -binary | od -An -tx1 | tr -d ' \n')

          if [ -z "$QIDI_MAX4_SIGNATURE" ]; then
            echo "Failed to generate X-Signature" >&2
            exit 1
          fi

          echo "::add-mask::$QIDI_MAX4_SIGNATURE"

          TS=$(($(date +%s%N)/1000000))
          NONCE=$(openssl rand -hex 16)
          API_URL="https://api.qidimaker.com/backend/v1/fireware/upgrade-info"

          curl -sS --get "$API_URL" \
            --data-urlencode "hardware=${{ steps.settings.outputs.hardware }}" \
            --data-urlencode "currentVersion=${{ steps.current_version.outputs.current_version }}" \
            --data-urlencode "deviceId=${QIDI_MAX4_DEVICE_ID}" \
            -H "User-Agent: ${{ steps.settings.outputs.user_agent }}" \
            -H "Accept: */*" \
            -H "Accept-Language: ${{ steps.settings.outputs.accept_language }}" \
            -H "Content-Type: application/json" \
            -H "X-DeviceId: ${QIDI_MAX4_DEVICE_ID}" \
            -H "X-DeviceType: ${{ steps.settings.outputs.device_type }}" \
            -H "X-Nonce: ${NONCE}" \
            -H "X-Platform: ${{ steps.settings.outputs.platform }}" \
            -H "X-Region: ${{ steps.settings.outputs.region }}" \
            -H "X-Signature: ${QIDI_MAX4_SIGNATURE}" \
            -H "X-Timestamp: ${TS}" \
            -H "X-Timezone: ${{ steps.settings.outputs.timezone }}" \
            -H "X-Version: ${{ steps.settings.outputs.version_header }}" \
            > qidi-max4-update-response.json

          QIDI_MAX4_DEVICE_ID="$QIDI_MAX4_DEVICE_ID" QIDI_MAX4_SIGNATURE="$QIDI_MAX4_SIGNATURE" \
            perl -0pe 's/\Q$ENV{QIDI_MAX4_DEVICE_ID}\E/[REDACTED_DEVICE_ID]/g; s/\Q$ENV{QIDI_MAX4_SIGNATURE}\E/[REDACTED_SIGNATURE]/g' \
            qidi-max4-update-response.json > qidi-max4-update-response.sanitized.json

          unset QIDI_MAX4_DEVICE_ID
          unset QIDI_MAX4_SIGNATURE

      - name: Parse response
        id: parse
        run: |
          if ! CODE=$(jq -r '.code // empty' qidi-max4-update-response.json); then
            echo "Firmware endpoint response was not valid JSON" >&2
            exit 1
          fi

          MESSAGE=$(jq -r '.message // empty' qidi-max4-update-response.json)
          if [ "$CODE" != "200" ]; then
            echo "Unexpected API response code: ${CODE:-unknown}" >&2
            if [ -n "$MESSAGE" ]; then
              echo "API message: $MESSAGE" >&2
            fi
            exit 1
          fi

          NEED_UPDATE=$(jq -r '.data.needUpdate' qidi-max4-update-response.json)
          VERSION=$(jq -r '.data.version' qidi-max4-update-response.json)
          URL=$(jq -r '.data.url' qidi-max4-update-response.json)
          DESCRIPTION=$(jq -r '.data.description' qidi-max4-update-response.json)
          APK_SIZE=$(jq -r '.data.apkSize' qidi-max4-update-response.json)
          IS_FORCE=$(jq -r '.data.isForce' qidi-max4-update-response.json)

          echo "need_update=$NEED_UPDATE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "apk_size=$APK_SIZE" >> "$GITHUB_OUTPUT"
          echo "is_force=$IS_FORCE" >> "$GITHUB_OUTPUT"
          {
            echo "description<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## QIDI Max 4 Firmware Check"
            echo ""
            printf -- '- Current version: `%s`\n' "${{ steps.current_version.outputs.current_version }}"
            printf -- '- Update available: `%s`\n' "$NEED_UPDATE"
            printf -- '- Available version: `%s`\n' "$VERSION"
            printf -- '- Forced update: `%s`\n' "$IS_FORCE"
            printf -- '- Package size: `%s`\n' "$APK_SIZE"
            echo "- Release notes: $DESCRIPTION"
            echo "- Package URL: $URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare release metadata
        id: release_meta
        run: |
          RELEASE_TAG=""
          if [ "${{ steps.parse.outputs.need_update }}" = "true" ] && [ -n "${{ steps.parse.outputs.version }}" ] && [ "${{ steps.parse.outputs.version }}" != "null" ]; then
            RELEASE_TAG="qidi-max4-firmware-${{ steps.parse.outputs.version }}"
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check for existing release
        id: release_check
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            if (!tag) {
              core.setOutput('exists', 'false');
              return;
            }

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
                return;
              }

              throw error;
            }

      - name: Upload sanitized response
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qidi-max4-update-response-sanitized
          path: qidi-max4-update-response.sanitized.json
          if-no-files-found: ignore

  download-package:
    runs-on: ubuntu-latest
    needs: check-firmware
    if: needs.check-firmware.outputs.need_update == 'true' && needs.check-firmware.outputs.release_exists != 'true' && (github.event_name == 'schedule' || inputs.download_package == true || inputs.publish_release == true)
    permissions:
      contents: read
    steps:
      - name: Download package
        run: |
          PACKAGE_URL="${{ needs.check-firmware.outputs.url }}"
          # Preserve the vendor filename exactly as published by QIDI.
          PACKAGE_NAME=$(basename "${PACKAGE_URL%%\?*}")
          PACKAGE_DIR="package-artifacts"

          mkdir -p "$PACKAGE_DIR"

          wget -O "$PACKAGE_DIR/$PACKAGE_NAME" "$PACKAGE_URL"
          sha256sum "$PACKAGE_DIR/$PACKAGE_NAME" | tee "$PACKAGE_DIR/$PACKAGE_NAME.sha256"
          file "$PACKAGE_DIR/$PACKAGE_NAME" | tee "$PACKAGE_DIR/$PACKAGE_NAME.file.txt"

      - name: Inspect archive contents
        run: |
          PACKAGE_URL="${{ needs.check-firmware.outputs.url }}"
          PACKAGE_NAME=$(basename "${PACKAGE_URL%%\?*}")
          PACKAGE_DIR="package-artifacts"

          unzip -l "$PACKAGE_DIR/$PACKAGE_NAME" | tee "$PACKAGE_DIR/$PACKAGE_NAME.contents.txt"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: qidi-max4-firmware-package
          path: |
            package-artifacts/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - check-firmware
      - download-package
    if: needs.check-firmware.outputs.need_update == 'true' && needs.check-firmware.outputs.release_exists != 'true' && (github.event_name == 'schedule' || inputs.publish_release == true)
    permissions:
      contents: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: qidi-max4-firmware-package
          path: release-assets/package-artifacts

      - name: Create GitHub release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ needs.check-firmware.outputs.release_tag }}
          RELEASE_NAME: QIDI Max 4 Firmware ${{ needs.check-firmware.outputs.version }}
          CURRENT_VERSION: ${{ needs.check-firmware.outputs.current_version }}
          AVAILABLE_VERSION: ${{ needs.check-firmware.outputs.version }}
          IS_FORCE: ${{ needs.check-firmware.outputs.is_force }}
          APK_SIZE: ${{ needs.check-firmware.outputs.apk_size }}
          DESCRIPTION_URL: ${{ needs.check-firmware.outputs.description }}
          PACKAGE_URL: ${{ needs.check-firmware.outputs.url }}
          ASSET_DIR: release-assets/package-artifacts
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const assetDir = process.env.ASSET_DIR;

            const assetFiles = fs.readdirSync(assetDir)
              .map((name) => path.join(assetDir, name))
              .filter((filePath) => fs.statSync(filePath).isFile())
              .sort((a, b) => path.basename(a).localeCompare(path.basename(b)));

            if (assetFiles.length === 0) {
              core.setFailed(`No release assets found in ${assetDir}`);
              return;
            }

            const zipAssets = assetFiles.filter((filePath) => filePath.toLowerCase().endsWith('.zip'));
            if (zipAssets.length === 0) {
              core.setFailed(`No firmware zip asset found in ${assetDir}`);
              return;
            }

            const packageFilename = path.basename(zipAssets[0]);

            const releaseBody = [
              '## Package Metadata',
              `- Source current version: \`${process.env.CURRENT_VERSION}\``,
              `- Available version: \`${process.env.AVAILABLE_VERSION}\``,
              `- Forced update: \`${process.env.IS_FORCE}\``,
              `- Package size: \`${process.env.APK_SIZE}\``,
              `- Release notes URL: ${process.env.DESCRIPTION_URL}`,
              `- Original QIDI package URL: ${process.env.PACKAGE_URL}`,
              '',
              '## Offline Update Instructions',
              '1. Create a new folder on your USB drive and name it `QD_Update`.',
              `2. Download the attached firmware package asset \`${packageFilename}\` from this release.`,
              '3. Drag the compressed file directly into the `QD_Update` folder without extracting it.',
              '4. Insert the USB drive into your machine and perform the offline update.',
              '',
              'Source: QIDI Max 4 firmware metadata endpoint',
            ].join('\n');

            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: process.env.RELEASE_TAG,
              name: process.env.RELEASE_NAME,
              body: releaseBody,
              draft: false,
              prerelease: false,
              generate_release_notes: false,
            });

            for (const filePath of assetFiles) {
              const data = fs.readFileSync(filePath);

              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.id,
                name: path.basename(filePath),
                data,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': data.length,
                },
              });
            }
