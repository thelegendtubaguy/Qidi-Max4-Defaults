[gcode_macro EXTRUSION_AND_FLUSH]
gcode:
    {% set hotendtemp = params.HOTEND|int %}
    {% if printer.save_variables.variables.box_count > 0 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
      MOVE_TO_TRASH
      M109 S{hotendtemp}
      M83
      G1 E50 F300
      G1 E-2 F1800
      {% for i in range(1,3) %}
          M106 S255
          M400
          M106 S60
          G1 E60 F300
          G1 E-2 F1800
      {% endfor %}
      M106 S255
      M400
      G4 P6000
      CLEAR_OOZE
      CLEAR_FLUSH
      M106 S60
    {% endif %}

    {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == False %}
      M118 Filament run out
      PAUSE
    {% endif %}

[gcode_macro CUT_FILAMENT_1]
gcode:
  _CG28
  M204 S10000
  {% if (printer.gcode_move.position.x) < 15 %}
    G1 X15 F9000
    G1 Y0 F9000
  {% endif %}
  M400
  SET_OPERATING_CURRENT STEPPER=x  VALUE=1500
  G4 P400
  SET_OPERATING_CURRENT STEPPER=y  VALUE=1500
  G4 P400
  G1 Y0 F15000
  G1 X15 F15000
  G1 X3 F8000
  M83
  G1 E-4 F1000
  G1 X4 F1000
  G1 X3 F8000
  G1 X15 F3000
  M400
  SET_OPERATING_CURRENT STEPPER=x  VALUE=1200
  G4 P400
  SET_OPERATING_CURRENT STEPPER=y  VALUE=1200
  G4 P2000




[gcode_macro M603]
description: filament unlode
gcode:
  SET_PRINT_MAIN_STATUS MAIN_STATUS=filament_unload_7
  {% set km = printer["gcode_macro _km_globals"] %}
  DISABLE_ALL_SENSOR
  {% set hotendtemp = params.S|default(250)|int %}
  _CG28
  M104 S{hotendtemp}

  MOVE_TO_TRASH
  M109 S{hotendtemp}
  M118 Heat up complete
  SET_PRINT_SUB_STATUS SUB_STATUS=cut_filamenting

  G92 E0 
  G1 E-10 F300     #退料10mm

  {% if printer.save_variables.variables.box_count > 0 and printer["box_extras"]%}
    E_UNLOAD SLOT=16
  {% endif %}
  CUT_FILAMENT_1
  MOVE_TO_TRASH
  G92 E0 
  G1 E-60 F300     #退料60mm
  SET_PRINT_SUB_STATUS SUB_STATUS=unload_filamenting

  M104 S0

  G1 X{km.park_x + 26} F10000
  G1 X{km.park_x + 8} F5000
  G1 X{km.park_x + 26} F10000
  G1 X{km.park_x + 8} F5000
  G1 X{km.park_x + 26} F10000
  G1 X{km.park_x + 8} F5000
  G1 X{km.park_x} F5000
  G1 Y380 F10000

  M106 S0
  M400
  _KM_BEEP_IF_AVAILABLE BEEPS={params.BEEPS|default(8)}
  M118 Unload finish
  SET_PRINT_MAIN_STATUS MAIN_STATUS=ready

[gcode_macro M604]
gcode:
    DISABLE_ALL_SENSOR
    {% set hotendtemp = params.S|default(250)|int %}
    {% set mode = params.T|default(0)|int %}
    {% set km = printer["gcode_macro _km_globals"] %}
    {% if mode == 0 %} 
      SET_PRINT_MAIN_STATUS MAIN_STATUS=filament_load_6
      G28 O
      MOVE_TO_TRASH
    {% endif %}
    {% if printer.save_variables.variables.box_count > 0 and mode == 0 and printer["box_extras"]%}
      M118 check box filament
      E_LOAD SLOT=16 S={hotendtemp}
    {% endif %}
    {% if mode == 0 %}  #加热
      M104 S{hotendtemp}
      MOVE_TO_TRASH
      M109 S{hotendtemp}
      M118 Heat up complete
      SET_PRINT_SUB_STATUS SUB_STATUS=push_filamenting
    {% elif mode ==1 %}      #尝试挤入
      G92 E0
      G1 E80 F400
      M400
    {% elif mode ==2 %}      #确认有耗材挤出冲刷旧耗材
      SET_PRINT_SUB_STATUS SUB_STATUS=clean_filamenting
      MOVE_TO_TRASH
      G92 E0 
      G1 E250 F300
      M400
      M106 S255

      G92 E0
      G1 E-4 F1000

      M104 S140  
      TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={hotendtemp-30} 

      G1 X{km.park_x + 26} F10000 
      G1 X{km.park_x + 8} F5000 
      G1 X{km.park_x + 26} F10000 
      G1 X{km.park_x + 8} F5000 
      G1 X{km.park_x + 26} F10000 
      G1 X{km.park_x + 8} F5000 
      G1 X{km.park_x} F5000 
      {% if not printer.pause_resume.is_paused %}  # 如果当前不处于暂停状态
        G1 Y380 F10000
      {% endif %}
      M400
      M106 S0
      M104 S0
      SET_PRINT_MAIN_STATUS MAIN_STATUS=ready
    {% endif %}
