[gcode_macro pause]
description: Pauses the current print.
  Usage: PAUSE [X=<pos>] [Y=<pos>] [Z=<pos>] [E=<retract_length>] [B=<beeps>]
rename_existing: _KM_PAUSE_BASE
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  # Retract length (negative)
  # 耗材回抽长度设置(防止渗漏)
  {% set E = (params.E|default(5))|float %}

  # === 暂停状态检查 ===
  {% if printer.pause_resume.is_paused %}
    { action_respond_info("Print already paused") }  # 已暂停则提示
  {% elif printer.idle_timeout.state | string == "Printing" or
          (printer.virtual_sdcard|default({})).is_active|default(False) %}
    # === 状态管理 ===
    SET_PRINT_MAIN_STATUS MAIN_STATUS=pausing  # 设置主状态为暂停中
    # === 位置和参数保存 ===
    {% set position = printer.gcode_move.gcode_position %}  # 获取当前G代码位置
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_x VALUE="{position.x}"  # 保存X位置
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_y VALUE="{position.y}"  # 保存Y位置
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_z VALUE="{position.z}"  # 保存Z位置
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_e VALUE="{E}"  # 保存回抽长度
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{printer['extruder'].target}"  # 保存目标温度
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_efan VALUE={printer["fan_generic cooling_fan"].speed *255}
    SAVE_GCODE_STATE NAME=_KM_PAUSE_OVERRIDE_STATE  # 保存完整G代码状态

    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
      BUFFER_MONITORING ENABLE=0 
    {% endif %}
 
    _KM_PAUSE_BASE  
    DISABLE_ALL_SENSOR  # 禁用所有传感器

    M83 
    {% if printer.extruder.can_extrude %}  # 如果挤出机可以挤出
      G1 E{'%.4f' % -E} F{km.load_speed}  # 回抽指定长度防止渗漏
    {% endif %}
    # === 移动到安全停放位置 ===
      PARK P=2{% for k in params|select("in", "XYZ") %}{
          ' '~k~'="'~params[k]~'"'}{% endfor %}  # 停放到指定位置(P=2表示暂停停放)
    _KM_BEEP_IF_AVAILABLE BEEPS={params.B|default(10)}  # 蜂鸣提示(默认10次)
    M104 S0             #关闭温度(节能并防止耗材劣化)
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    SET_IDLE_TIMEOUT TIMEOUT=259200  #72h(259200秒=72小时超长待机)
  #############
  {% else %}
    { action_respond_info("Print not in progress") }  # 非打印状态时提示
  {% endif %}



# 智能恢复系统宏 - 全自动打印恢复处理
# 功能: 预热挤出机、清洗喷嘴、恢复位置、补偿耗材、恢复打印状态
# 参数: E=指定回补长度(覆盖保存的回抽长度)
# 流程: 温度检查→预热→清洗→位置恢复→耗材补偿→状态恢复
[gcode_macro RESUME_PRINT]
description: Resumes the currently paused print.
  Usage: RESUME [E<pos>]
#rename_existing: _KM_RESUME_BASE
variable_saved_extruder_temp: 0  # 保存的挤出机目标温度
variable_saved_x: 0.0  # 保存的X位置
variable_saved_y: 0.0  # 保存的Y位置
variable_saved_z: 0.0  # 保存的Z位置
variable_saved_e: 0.0  # 保存的回抽长度
variable_saved_efan: 0 #保存的风扇状态
gcode:
  # === 暂停状态检查和初始化 ===
  {% if printer.pause_resume.is_paused %}  # 确认当前处于暂停状态
    {% set km = printer["gcode_macro _km_globals"] %}
    {% set extruder = printer[printer.toolhead.extruder] %}

    {% if saved_extruder_temp > 0 %}
      M106 S0
      M109 S{saved_extruder_temp}  
      G1 X{km.park_x} F9000  
      G1 Y{km.park_y} F9000           
      G92 E0
      M83
      G1  E250 F300  
    

      G1 X{km.park_x + 27} F10000  
      G1 X{km.park_x + 8} F6000  
      G1 X{km.park_x + 27} F10000  
      G1 X{km.park_x + 8} F6000 
      G1 X{km.park_x + 27} F10000  
      G1 X{km.park_x + 8} F6000 
      G1 X{km.park_x} F5000


      SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{0}"  # 清空保存的温度
      G90  
      M106 S{saved_efan}
      G0 X{km.park_x - 19} F{km.travel_speed_xy}  #修改从缺口出来
      G0 Y{km.park_y - 30} F{km.travel_speed_xy}  
      G0 X{saved_x} Y{saved_y} F{km.travel_speed_xy}  
      G0 Z{saved_z} F{km.travel_speed_z}  
      G91  
    {% endif %}
#    G1 E{'%.4f' % (params.E|default(saved_e))} F{km.load_speed}  # 补偿暂停时的回抽

    {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 %} 
      BUFFER_MONITORING ENABLE=1
    {% endif %}
    {% if not (printer["box_extras"] and printer["box_extras"].is_tool_change == 1) %}
      ENABLE_ALL_SENSOR
    {% endif %}

    RESTORE_GCODE_STATE NAME=_KM_PAUSE_OVERRIDE_STATE MOVE=1  
    _KM_RESUME_BASE  
    SET_PRINT_MAIN_STATUS MAIN_STATUS=printing   
  {% else %}
    { action_respond_info("Printer is not paused.") }  
  {% endif %}



[gcode_macro RESUME]
rename_existing: _KM_RESUME_BASE
gcode:
  {% if printer['pause_resume'].is_paused|int == 1 %}
    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
      {% if printer.save_variables.variables.enable_box == 1 %}
        TRY_RESUME_PRINT
      {% else %}
        {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
          RESUME_PRINT
        {% else %}
          M118 Please load filament
        {% endif %}
      {% endif %}
    {% else %}
        {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
          RESUME_PRINT
        {% else %}
          M118 Please load filament
        {% endif %}
    {% endif %}
    {% endif %}




[gcode_macro CANCEL_PRINT]
description: Cancels the current print.
  Usage: CANCEL_PRINT
rename_existing: _KM_CANCEL_PRINT_BASE
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  # === 打印状态验证 ===
  _KM_CHECK_IS_PRINTING  # 确认当前正在打印
  # === 状态管理 ===
  SET_PRINT_MAIN_STATUS MAIN_STATUS=cancelling  # 设置主状态为取消中

  SET_GCODE_VARIABLE MACRO=_print_end_inner VARIABLE=cancelled VALUE="{True}"  # 标记为取消状态
  {% if (printer.gcode_move.position.z) < 200 %}
      G1 Z200 F480                                       
  {% endif %}
#  PARK         暂时不停到擦料位置，只停放Y
  G1 Y380 F5000

  PRINT_END  
  _KM_CANCEL_PRINT_BASE  
  M107          #关闭风扇
  M106 P2 S0
  M106 P3 S0
  M106 P4 S0
  {% if printer.pause_resume.is_paused %}  
    RESTORE_GCODE_STATE NAME=_KM_PAUSE_OVERRIDE_STATE MOVE=0  
  {% endif %}
  CLEAR_PAUSE  


# 暂停状态清理工具宏 - 手动清除所有暂停相关数据
# 功能: 清空保存的位置、温度、挤出参数，重置暂停状态
# 用途: 故障恢复、强制清理、系统重置
[gcode_macro clear_pause]
description: Clears the current pause state.
  Usage: CLEAR_PAUSE
rename_existing: _KM_CLEAR_PAUSE
gcode:
  # === 清空保存的参数 ===
  SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_e VALUE="{0.0}"  # 清空保存的挤出长度
  SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{0}"  # 清空保存的温度
  SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{0}"  # 情况风扇速度
  # === 调用原生清理 ===
  _KM_CLEAR_PAUSE  # 调用Klipper原生暂停清理


# 换料宏 - M600 (Marlin兼容命令)
# 功能: 自动换料流程，包含暂停、卸载耗材、等待用户操作、加热恢复
# 参数: B=蜂鸣次数, E=挤出位置, L=加载长度, R=恢复温度, U=卸载长度, X/Y/Z=停放位置
[gcode_macro m600]
description: Pauses the current print.
  Usage: M600 [B<beeps>] [E<pos>] [L<pos>] [R<temp>] [U<pos>] [X<pos>] [Y<pos>]
              [Z<pos>]
gcode:
  # === 暂停打印并移动到换料位置 ===
  PAUSE B="{0}" P=2{% for k in params|select("in", "EXYZ") %}{
      ' '~k~'="'~params[k]~'"'}{% endfor %}  # 暂停并传递位置参数
  # === 自动卸载旧耗材 ===
  UNLOAD_FILAMENT{% if 'U' in params %} LENGTH={params.U}{% endif
               %} BEEPS="{params.B|default(10)|int}"  # 卸载耗材(可指定长度和蜂鸣次数)
  # === 可选的温度预热 ===
  {% if 'R' in params %}M109 S{params.R}{% endif %}  # 如果指定R参数则预热到指定温度

# Marlin兼容暂停命令 - M601
# 功能: 简单暂停打印，等同于PAUSE命令
[gcode_macro m601]
description: Pauses the current print.
  Usage: M601
gcode:
  PAUSE  # 直接调用PAUSE宏

# Marlin兼容恢复命令 - M602 
# 功能: 恢复暂停的打印，等同于RESUME命令
[gcode_macro m602]
description: Resumes the currently paused print.
  Usage: M602
gcode:
  RESUME  # 直接调用RESUME宏

# Marlin兼容开始命令重写 - M24
# 功能: 智能开始/恢复，根据状态自动选择恢复或开始
[gcode_macro m24]
rename_existing: M24.6245197
gcode:
  {% if printer.pause_resume.is_paused %}  # 如果当前处于暂停状态
  RESUME  # 恢复打印
  {% else %}  # 如果未暂停
  M24.6245197  # 调用原始M24命令(开始打印)
  {% endif %}

# Marlin兼容暂停命令重写 - M25
# 功能: 暂停当前打印，等同于PAUSE命令
[gcode_macro m25]
rename_existing: M25.6245197
gcode:
  PAUSE  # 调用PAUSE宏暂停打印

