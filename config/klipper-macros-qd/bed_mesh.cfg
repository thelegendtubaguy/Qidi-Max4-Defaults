
[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
description: Adaptive mesh calibration with intelligent probe density optimization.
  Combines KAMP's object detection with bed_mesh_fast's density scaling.
  Usage: BED_MESH_CALIBRATE [PROFILE=<profile_name>] [FORCE_NEW_MESH=<0|1>]
  - Auto mode: Detects print objects and optimizes mesh region automatically
gcode:
  # === 安全检查 ===
  BED_MESH_CHECK ABORT=1  


  {% set km = printer["gcode_macro _km_globals"] %}
  {% set kamp_settings = printer["gcode_macro _KAMP_Settings"] %}
  {% set bed_mesh = printer.configfile.settings.bed_mesh %}
  

  {% set verbose_enable = kamp_settings.verbose_enable | abs %}
  {% set probe_dock_enable = kamp_settings.probe_dock_enable | abs %}
  {% set attach_macro = kamp_settings.attach_macro | string %}
  {% set detach_macro = kamp_settings.detach_macro | string %}
  {% set mesh_margin = kamp_settings.mesh_margin | float %}
  {% set fuzz_amount = kamp_settings.fuzz_amount | float %}
  

  {% set probe_mesh_padding = km.probe_mesh_padding %}
  {% set probe_min_count = km.probe_min_count %}
  {% set probe_count_scale = km.probe_count_scale %}
  

  {% set bed_mesh_min = bed_mesh.mesh_min %}
  {% set bed_mesh_max = bed_mesh.mesh_max %}
  {% set probe_count = bed_mesh.probe_count if bed_mesh.probe_count|length > 1 else bed_mesh.probe_count * 2 %}
  
  #获取文件区域对象
  {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
  {% set has_objects = all_points|length > 0 %}
  
  {% if has_objects %}
    # 获取对象边界
    {% set x_min = all_points | map(attribute=0) | min %}
    {% set y_min = all_points | map(attribute=1) | min %}  
    {% set x_max = all_points | map(attribute=0) | max %}
    {% set y_max = all_points | map(attribute=1) | max %}
    
    # 添加随机偏移防止重复探测
    {% set fuzz_range = range((0) | int, (fuzz_amount * 100) | int + 1) %}
    {% set adapted_x_min = x_min - mesh_margin - (fuzz_range | random / 100.0) %}
    {% set adapted_y_min = y_min - mesh_margin - (fuzz_range | random / 100.0) %}
    {% set adapted_x_max = x_max + mesh_margin + (fuzz_range | random / 100.0) %}
    {% set adapted_y_max = y_max + mesh_margin + (fuzz_range | random / 100.0) %}
    
    # 限制在床面安全范围内
    {% set adapted_x_min = [adapted_x_min, bed_mesh_min[0]] | max %}
    {% set adapted_y_min = [adapted_y_min, bed_mesh_min[1]] | max %}
    {% set adapted_x_max = [adapted_x_max, bed_mesh_max[0]] | min %}
    {% set adapted_y_max = [adapted_y_max, bed_mesh_max[1]] | min %}
  {% else %}
    # 没有对象信息，使用全床范围
    {% set adapted_x_min = bed_mesh_min[0] %}
    {% set adapted_y_min = bed_mesh_min[1] %}
    {% set adapted_x_max = bed_mesh_max[0] %}
    {% set adapted_y_max = bed_mesh_max[1] %}
  {% endif %}

  # === 最小区域保证算法(解决5mm×5mm报错问题) ===
  {% set max_probe_point_distance_x = (bed_mesh_max[0] - bed_mesh_min[0]) / (probe_count[0] - 1) %}
  {% set max_probe_point_distance_y = (bed_mesh_max[1] - bed_mesh_min[1]) / (probe_count[1] - 1) %}
  
  # 计算3x3网格所需的最小区域尺寸 (2个间隔 = 3个点)
  {% set min_region_x = max_probe_point_distance_x * 2 %}  
  {% set min_region_y = max_probe_point_distance_y * 2 %}
  
  # 检查当前区域是否过小
  {% set current_x_size = adapted_x_max - adapted_x_min %}
  {% set current_y_size = adapted_y_max - adapted_y_min %}
  
  {% if current_x_size < min_region_x %}
    # X轴区域过小，居中扩展
    {% set expand_x = (min_region_x - current_x_size) / 2 %}
    {% set adapted_x_min = (adapted_x_min - expand_x, bed_mesh_min[0]) | max %}
    {% set adapted_x_max = (adapted_x_max + expand_x, bed_mesh_max[0]) | min %}
    # 如果扩展后仍然不够，调整另一边
    {% if (adapted_x_max - adapted_x_min) < min_region_x %}
      {% if adapted_x_min == bed_mesh_min[0] %}
        {% set adapted_x_max = adapted_x_min + min_region_x %}
      {% else %}
        {% set adapted_x_min = adapted_x_max - min_region_x %}  
      {% endif %}
    {% endif %}
  {% endif %}
  
  {% if current_y_size < min_region_y %}
    # Y轴区域过小，居中扩展
    {% set expand_y = (min_region_y - current_y_size) / 2 %}
    {% set adapted_y_min = (adapted_y_min - expand_y, bed_mesh_min[1]) | max %}
    {% set adapted_y_max = (adapted_y_max + expand_y, bed_mesh_max[1]) | min %}
    # 如果扩展后仍然不够，调整另一边
    {% if (adapted_y_max - adapted_y_min) < min_region_y %}
      {% if adapted_y_min == bed_mesh_min[1] %}
        {% set adapted_y_max = adapted_y_min + min_region_y %}
      {% else %}
        {% set adapted_y_min = adapted_y_max - min_region_y %}
      {% endif %}
    {% endif %}
  {% endif %}

  # === bed_mesh_fast智能密度优化算法 ===
  {% set safe_min_x = bed_mesh_min[0] %}
  {% set safe_min_y = bed_mesh_min[1] %}
  {% set safe_max_x = bed_mesh_max[0] %}
  {% set safe_max_y = bed_mesh_max[1] %}
  
  # 动态探测点数量计算
  {% set max_x_probes = probe_count[0] %}
  {% set max_y_probes = probe_count[-1] %}
  
  # 核心算法: 探测点数 = 最大点数 × (实际区域/全床区域) × 缩放因子
  {% set x_probes = (max_x_probes * (adapted_x_max - adapted_x_min) /
                     (safe_max_x - safe_min_x) * probe_count_scale)
                    | round(0) | int %}
  {% set y_probes = (max_y_probes * (adapted_y_max - adapted_y_min) /
                     (safe_max_y - safe_min_y) * probe_count_scale)
                    | round(0) | int %}
  
  # 确保探测点在最小值和最大值之间
  {% set x_probes = ((x_probes, probe_min_count)|max, max_x_probes)|min %}
  {% set y_probes = ((y_probes, probe_min_count)|max, max_y_probes)|min %}
  
  # === 插值算法智能选择 ===
  {% if x_probes > 6 or y_probes > 6 %}
    {% set algorithm = "bicubic" %}
    # Bicubic插值算法需要至少4个点
    {% if x_probes > 6 and y_probes < 4 %}
      {% set y_probes = 4 %}
    {% elif y_probes > 6 and x_probes < 4 %}
      {% set x_probes = 4 %}
    {% endif %}
  {% else %}
    {% set algorithm = "lagrange" %}
  {% endif %}

  # === 相对参考点重映射算法(高级功能) ===
  {% set relative_reference_index = None %}
  {% if "relative_reference_index" in bed_mesh %}
    # 计算原始参考点坐标
    {% set row = (bed_mesh.relative_reference_index / bed_mesh.probe_count[0])|int %}
    {% set rrf_x = (((safe_max_x - safe_min_x) / (bed_mesh.probe_count[0] - 1))|round(2, 'floor')) *
                   (bed_mesh.relative_reference_index % bed_mesh.probe_count[-1]) %}
    {% if row % 2 %}
      {% set rrf_x = safe_max_x - rrf_x %}
    {% else %}
      {% set rrf_x = safe_min_x + rrf_x %}
    {% endif %}
    {% set rrf_y = (((safe_max_y - safe_min_y) / (bed_mesh.probe_count[-1] - 1))|round(2, 'floor')) *
                   row + safe_min_x %}
    
    # 在新网格中找最接近的点
    {% set x_dist = (adapted_x_max - adapted_x_min) / (x_probes - 1) %}
    {% set y_dist = (adapted_y_max - adapted_y_min) / (y_probes - 1) %}
    {% set rrf = {'x':0, 'y':0, 'dist':safe_max_x**2+safe_max_y**2,'pos':0} %}
    
    {% for row in range(y_probes) %}
      {% for col in range(x_probes) %}
        {% if row % 2 %}
          {% set x = adapted_x_max - col * x_dist %}
        {% else %}
          {% set x = adapted_x_min + col * x_dist %}
        {% endif %}
        {% set y = adapted_y_min + row * y_dist %}
        {% set dist = ((x - rrf_x)**2 + (y - rrf_y)**2)**0.5 %}
        {% if dist < rrf.dist %}
          {% set dummy = rrf.__setitem__("dist", dist) %}
          {% set dummy = rrf.__setitem__("pos", row * y_probes + col) %}
        {% endif %}
      {% endfor %}
    {% endfor %}
    {% set relative_reference_index = rrf.pos %}
  {% endif %}

  # === 详细信息输出 ===
  {% if verbose_enable %}
    {action_respond_info("=== 智能自适应床网校准 ===")}
    {action_respond_info("算法类型: %s" % algorithm)}
    {action_respond_info("默认探测点数: %d,%d" % (probe_count[0], probe_count[1]))}
    {action_respond_info("优化探测点数: %d,%d" % (x_probes, y_probes))}
    {action_respond_info("默认床网范围: (%.1f,%.1f) 到 (%.1f,%.1f)" % 
      (bed_mesh_min[0], bed_mesh_min[1], bed_mesh_max[0], bed_mesh_max[1]))}
    {action_respond_info("实际床网范围: (%.1f,%.1f) 到 (%.1f,%.1f)" % 
      (adapted_x_min, adapted_y_min, adapted_x_max, adapted_y_max))}
    
    {% if has_objects %}
      {% if mesh_margin > 0 %}
        {action_respond_info("网格边距: %.1fmm" % mesh_margin)}
      {% endif %}
      {% if fuzz_amount > 0 %}
        {action_respond_info("探测点随机化: ±%.1fmm" % fuzz_amount)}
      {% endif %}
      {% set area_reduction = (1 - (adapted_x_max - adapted_x_min) * (adapted_y_max - adapted_y_min) / 
                              ((safe_max_x - safe_min_x) * (safe_max_y - safe_min_y))) * 100 %}
      {% set time_saving = (1 - (x_probes * y_probes) / (probe_count[0] * probe_count[1])) * 100 %}
    {% else %}
      {action_respond_info("No print object detected! Please check gcode and exclude_object configuration. Use full bed mesh calibration.")}
      {action_respond_info("Tip: Ensure the exclude_object tags are enabled in your slicer.")}
    {% endif %}
  {% endif %}


  {% set mesh_params = [] %}
  {% set dummy = mesh_params.append('MESH_MIN=%.1f,%.1f' % (adapted_x_min, adapted_y_min)) %}
  {% set dummy = mesh_params.append('MESH_MAX=%.1f,%.1f' % (adapted_x_max, adapted_y_max)) %}
  {% set dummy = mesh_params.append('ALGORITHM=%s' % algorithm) %}
  {% set dummy = mesh_params.append('PROBE_COUNT=%d,%d' % (x_probes, y_probes)) %}
  {% if relative_reference_index is not none %}
    {% set dummy = mesh_params.append('RELATIVE_REFERENCE_INDEX=%d' % relative_reference_index) %}
  {% endif %}
  {% if params.PROFILE %}
    {% set dummy = mesh_params.append('PROFILE=%s' % params.PROFILE) %}
  {% else %}
    {% set dummy = mesh_params.append('PROFILE=default') %}
  {% endif %}
  SET_PRINT_SUB_STATUS SUB_STATUS=meshing
  _BED_MESH_CALIBRATE {mesh_params|join(' ')}
  

  
[gcode_macro _KAMP_Settings]
description: KAMP configuration settings for adaptive meshing
variable_verbose_enable: True               
variable_mesh_margin: 5                      
variable_fuzz_amount: 0                     
variable_probe_dock_enable: False           
variable_attach_macro: 'Attach_Probe'       
variable_detach_macro: 'Dock_Probe'         
gcode:

[gcode_macro bed_mesh_check]
description: Warns if bed_mesh config may generate an invalid mesh.
  Usage: BED_MESH_CHECK [MESH_MIN=<x,y>] [MESH_MAX=<x,y>] [ABORT=<0|1>]
gcode:
  {% if printer.bed_mesh is defined %}
    {% set action = action_respond_info if params.ABORT|default(0)|int == 0 else
                    action_raise_error %}
    {% set settings = printer.configfile.settings %}
    
    {% set x_min = settings.stepper_x.position_min %}
    {% set y_min = settings.stepper_y.position_min %}  
    {% set x_max = settings.stepper_x.position_max %}
    {% set y_max = settings.stepper_y.position_max %}


    {% set label = "[bed_mesh] config" %}
    {% if "MESH_MIN" in params %}
      {% set label = "BED_MESH_CALIBRATE params" %}
      {% set mesh_min_x = params.MESH_MIN.split(",")[0]|float %}
      {% set mesh_min_y = params.MESH_MIN.split(",")[1]|float %}
    {% else %}
      {% set mesh_min_x = settings.bed_mesh.mesh_min[0] %}
      {% set mesh_min_y = settings.bed_mesh.mesh_min[1] %}
    {% endif %}
    
    {% if "MESH_MAX" in params %}
      {% set label = "BED_MESH_CALIBRATE params" %}
      {% set mesh_max_x = params.MESH_MAX.split(",")[0]|float %}
      {% set mesh_max_y = params.MESH_MAX.split(",")[1]|float %}
    {% else %}
      {% set mesh_max_x = settings.bed_mesh.mesh_max[0] %}
      {% set mesh_max_y = settings.bed_mesh.mesh_max[1] %}
    {% endif %}

    {% if "bltouch" in settings %}
        {% set x_offset = settings.bltouch.x_offset %}
        {% set y_offset = settings.bltouch.y_offset %}
        {% set probe = "bltouch" %}
    {% elif "probe" in settings %}
        {% set x_offset = settings.probe.x_offset %}
        {% set y_offset = settings.probe.y_offset %}
        {% set probe = "probe" %}
    {% else %}
        {% set x_offset = 0.0 %}
        {% set y_offset = 0.0 %}
    {% endif %}

    {% set output = [] %}
    {% set warn = "* mesh_%s (%.3f, %.3f) adjusted by " ~ probe ~
                  ".%s_offset (%.3f) can move out of range for "
                  "stepper_%s.position_%s (%.3f)." %}
                  
    {% if x_offset > 0 and (mesh_min_x - x_offset) < x_min %}
      {% set dummy = output.append(warn % ('min', mesh_min_x, mesh_min_y,
                                           'x', x_offset, 'x', 'min', x_min)) %}
    {% elif x_offset < 0 and (mesh_max_x - x_offset) > x_max %}
      {% set dummy = output.append(warn % ('max', mesh_max_x, mesh_max_y,
                                           'x', x_offset, 'x', 'max', x_max)) %}
    {% endif %}
    
    {% if y_offset > 0 and (mesh_min_y - y_offset) < y_min %}
      {% set dummy = output.append(warn % ('min', mesh_min_x, mesh_min_y,
                                           'y', y_offset, 'y', 'min', y_min)) %}
    {% elif y_offset < 0 and (mesh_max_y - y_offset) > y_max %}
      {% set dummy = output.append(warn % ('max', mesh_max_x, mesh_max_y,
                                           'y', y_offset, 'y', 'max', y_max)) %}
    {% endif %}

    {% if output %}
      { action("警告: 在您的" ~ label ~ "中检测到以下问题:\n" ~ output|join("\n")) }
    {% endif %}
  {% endif %}


[gcode_macro G31]
gcode:
  SET_GCODE_VARIABLE MACRO=_km_globals VARIABLE=bedmesh_before_print VALUE=1

[gcode_macro G32]
gcode:
  SET_GCODE_VARIABLE MACRO=_km_globals VARIABLE=bedmesh_before_print VALUE=0


[gcode_macro g29]
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}

  SET_STEPPER_ENABLE STEPPER=extruder enable=0
  BED_MESH_CLEAR
  {% if km.bedmesh_before_print|int == 1 %}
        G28 
        BED_MESH_CALIBRATE PROFILE=kamp
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"kamp"'
        G4 P5000
        SAVE_CONFIG_QD 
  {% else %}
    {% if printer["bed_mesh"].profiles.default %}
        BED_MESH_PROFILE LOAD=default
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
      {% else %}
            G28 
            BED_MESH_CALIBRATE PROFILE=default
            SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
            G4 P5000
            SAVE_CONFIG_QD
      {% endif %}
    {% endif %}

    


