


# 主打印开始宏 - 切片器调用的入口点
[gcode_macro print_start]
description: Usage: PRINT_START BED=<temp> HOTEND=<temp> [CHAMBER=<temp>] EXTRUDER = <num>
                     [MESH_MIN=<x,y>] [MESH_MAX=<x,y>] [LAYERS=<num>]
                     [NOZZLE_SIZE=<mm>]
gcode:
  # 设置打印主状态为开始阶段
  SET_PRINT_MAIN_STATUS MAIN_STATUS=print_start
  # === 打印启动四个核心阶段 ===
  _PRINT_START_PHASE_INIT {rawparams}   # 阶段1: 初始化设置并启动床/腔体预热
  _PRINT_START_BOX_PREPAR               # 阶段2: 多色耗材准备和切换  
  _PRINT_START_PHASE_PREHEAT            # 阶段3: 温度稳定和轴归位
  _PRINT_START_PHASE_PROBING            # 阶段4: 探测校准(床网/龙门架调平)
  _PRINT_START_PHASE_EXTRUDER           # 阶段5: 挤出机最终预热
  # 切换到正式打印状态
  SET_PRINT_MAIN_STATUS MAIN_STATUS=printing


[gcode_macro _print_start_phase_init]
description: Inserted by slicer at start of print. Initializes PRINT_START
  phases.
  Usage: See PRINT_START.
gcode:

  # === 基本系统初始化 ===
  CHECK_KM_CONFIG                                                     # 检查宏库配置参数
  M1001                                                                # 自动调节振动补偿参数
  DISABLE_ALL_SENSOR                                                  # 禁用所有传感器
  SET_GCODE_VARIABLE MACRO=_print_end_inner VARIABLE=cancelled VALUE="{False}" # 重置打印取消标志
  _KM_APPLY_PRINT_OFFSET RESET=1                                      # 重置打印偏移量
  _PRINT_START_PHASE_CHECK PHASE=none                                 # 验证阶段状态正确性
  {% set km = printer["gcode_macro _km_globals"] %}

  # === 参数兼容性处理 ===
  {% if not params.BED %}
    {% set dummy = params.__setitem__('BED', params.BED_TEMP|int) %}  # 兼容BED_TEMP参数
  {% endif %}
  {% if not params.HOTEND %}
    {% set dummy = params.__setitem__('HOTEND', params.HOTEND_TEMP|int) %} # 兼容HOTEND_TEMP参数
  {% endif %}

  # === 参数持久化存储 ===
  # 保存所有打印参数供后续阶段使用(包括温度、尺寸等)
  PRINT_START_SET PRINT_START_PHASE="init" {% for k in params %}{' %s=\"%s\"' %
    (k,params[k]|replace('\\','\\\\')|replace('\'','\\\'')|replace('\"','\\\"'))
  }{% endfor %}

  # === 打印边界检查和基本初始化 ===
  #_km_check_and_set_print_bounds                                     # 验证和设置打印边界参数-先屏蔽
  M107                                                                # 关闭零件冷却风扇
  CLEAR_PAUSE                                                         # 清除任何暂停状态
  # === 启动长时间预热进程 ===
  M140 S{params.BED}                                                  # 启动床加热(最耗时)
  {% if params.CHAMBER %}M141 S{params.CHAMBER|int}{% endif %}        # 启动腔体加热(如有)
  # === 床网校准准备 ===
  {% if printer.bed_mesh %}BED_MESH_CLEAR{% endif %}                  # 清除旧床网数据
  # 尝试加载保存的表面网格(如果配置了的话)
  # {% if km.start_try_saved_surface_mesh and printer.bed_mesh %}       
  #   LOAD_SURFACE_MESH                                                # 加载已保存的床面网格
  # {% endif %}
  G28
  # 进入下一阶段: 耗材准备
  PRINT_START_SET PRINT_START_PHASE="box_prepar"

# =============================================================================
# 阶段3: 多色耗材准备阶段 (AMS自动换料系统)
# =============================================================================
# 核心功能: 多色打印耗材管理和自动切换系统
# - 检测当前耗材槽位和目标槽位
# - 自动卸载旧耗材并清理喷嘴
# - 执行耗材切换和清洗流程
# - 保证打印前耗材状态正确
[gcode_macro _print_start_box_prepar]
description: Preparation of box filament
gcode:
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set BED = print.BED|int %}
  {% set HOTEND = print.HOTEND|int %}
  {% set EXTRUDER = print.EXTRUDER|default(0)|int %}       

  _PRINT_START_PHASE_CHECK PHASE=box_prepar                          # 验证阶段状态
  # === 多色耗材系统检查 ===
  BUFFER_MONITORING ENABLE=0
  {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
        SAVE_VARIABLE VARIABLE=load_retry_num VALUE=0
        SAVE_VARIABLE VARIABLE=retry_step VALUE=None
        CLEAR_TOOLCHANGE_STATE
        {% for i in range(16) %}
            SAVE_VARIABLE VARIABLE=runout_{i} VALUE=0
            G4 P100
        {% endfor %}
        {% if printer.save_variables.variables.enable_box == 1 %}
            BOX_PRINT_START EXTRUDER={EXTRUDER} HOTENDTEMP={HOTEND}
            M400
            EXTRUSION_AND_FLUSH HOTEND={HOTEND}
        {% endif %}
  {% endif %}  # === 多色系统检查结束 ===
  # 进入下一阶段: 预热阶段
  PRINT_START_SET PRINT_START_PHASE="preheat"


# =============================================================================
# 阶段3: 预热阶段 - 床和腔体温度稳定 + 轴归位
# =============================================================================
# 核心功能: 高效预热管理和温度稳定化
# - 床温过冲优化: 先过热再稳定到目标温度
# - 温度检测: 智能判断是否已达目标温度
# - 轴归位和喷嘴清理: 在加热过程中并行执行
# - 条件性探测预热: 根据后续操作决定挤出机预热策略
[gcode_macro _print_start_phase_preheat]
description: Inserted by slicer at start of print. Handles the bed and chamber
  heating phases and ends when both are stabilized at their target temperatures.
  Usage: See PRINT_START.
gcode:
  _PRINT_START_PHASE_CHECK PHASE=preheat                            # 验证阶段状态
  # === 获取打印参数 ===
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set BED = print.BED|int %}                                     # 床温
  {% set HOTEND = print.HOTEND|int %}                               # 挤出机温度
  {% set CHAMBER = print.CHAMBER|default(0)|int %}                  # 腔体温度
  {% set LAYERS = print.LAYERS|default(0)|int %}                    # 层数
  {% set km = printer["gcode_macro _km_globals"] %}                 # 全局参数
  # === 床温状态智能判断 ===
  # 判断床温是否已达目标(误差范围: -0.2~+1.0°C)
  {% set bed_at_target = (BED + 0.4 - printer.heater_bed.temperature) |
                           abs <= 0.6 %}                           # 床温是否已稳定
  PRINT_START_SET BED_AT_TARGET={1 if bed_at_target else 0}          # 保存床温状态
  # === 温度相关操作判断 ===
  {% set start_level_bed_at_temp = km.start_level_bed_at_temp and
                                   not printer.bed_mesh.profile_name %} # 需要在温度下调平
  {% set actions_at_temp = start_level_bed_at_temp or
                           km.start_quad_gantry_level_at_temp or
                           km.start_z_tilt_adjust_at_temp or
                           (km.start_home_z_at_temp and not bed_at_target) %} # 是否需要温度操作
  # === 床温过冲计算 ===
  {% set bed_overshoot = (BED + (km.start_bed_heat_overshoot if
             (BED and not bed_at_target) else 0.0),
           printer.configfile.settings.heater_bed.max_temp ) | min %} # 过冲温度(不超过最大值)

  # === 初始化和加热启动 ===
  INIT_LAYER_GCODE LAYERS="{LAYERS}"                                # 初始化层代码系统
  {% if CHAMBER > 0.0 %}
    M141 S{CHAMBER}                                                # 设置腔体温度
  {% endif %}
  M140 S{bed_overshoot}                                          # 启动床加热(过冲模式)
  # === 轴归位和喷嘴清理 ===                                                # 所有轴归位
  CLEAR_NOZZLE HOTEND={HOTEND}                                   # 预热并清理喷嘴


  # === 挤出机预热策略 ===
  {% if actions_at_temp %}                                       # 需要在温度下执行操作
    # 探测模式: 使用探测温度或部分预热避免渗漏
    M104 S{km.start_extruder_probing_temp if km.start_extruder_probing_temp > 0
      else (km.start_extruder_preheat_scale * HOTEND)|round(0,'ceil')|int}  # 设置探测温度
  {% else %}
    # 正常模式: 直接设置目标温度或探测温度
    M104 S{km.start_extruder_probing_temp if km.start_extruder_probing_temp > 0
      else HOTEND}                                              # 设置挤出机温度
  {% endif %}

  # === 床温精确控制流程 ===
  {% if BED > 0.0 %}                                             # 如果需要床加热
    {% if not bed_at_target %}                                   # 如果床温还未达目标
      PARK                                                       # 停放打印头
      # === 过冲-稳定床温策略 ===
      M190 S{bed_overshoot}                                      # 等待过冲温度
      G4 P{km.start_bed_heat_delay / 2}                          # 等待稳定(前半)
      M190 R{BED}                                                # 稳定到目标温度
      G4 P{km.start_bed_heat_delay / 2}                          # 等待稳定(后半)
    {% endif %}
  {% endif %}

  # # === 腔体温度控制 ===
  # {% if CHAMBER > 0.0 %}                                         # 如果需要腔体加热
  #   _KM_PARK_IF_NEEDED HEATER="chamber" RANGE=ABOVE              # 按需停放(温度低于目标时)
  #   M191 S{CHAMBER}                                              # 等待腔体达目标温度
  # {% endif %}

  # === 床温稳定性检查 ===
  {% if BED > 0.0 and bed_at_target%}                            # 如果之前跳过了床加热
    M190 R{BED}                                                  # 额外的床温稳定检查
  {% endif %}

  # 进入下一阶段: 探测阶段
  PRINT_START_SET PRINT_START_PHASE="probing"





# =============================================================================
# 阶段4: 探测校准阶段 - 床网校准
# =============================================================================
[gcode_macro _print_start_phase_probing]
gcode:
  _PRINT_START_PHASE_CHECK PHASE=probing                          # 验证阶段状态
  # === 获取探测参数 ===
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set km = printer["gcode_macro _km_globals"] %}

  {% set HOTEND = print.HOTEND|int %}
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set start_level_bed_at_temp = km.start_level_bed_at_temp and
                                   not printer.bed_mesh.profile_name %}
  {% set start_home_z_at_temp = km.start_home_z_at_temp and
                                not print.BED_AT_TARGET|int %}
  {% set actions_at_temp = start_level_bed_at_temp or
                           km.start_quad_gantry_level_at_temp or
                           km.start_z_tilt_adjust_at_temp or
                           start_home_z_at_temp %}
  {% if actions_at_temp %}
    {% if km.start_extruder_probing_temp > 0 %}
    _KM_PARK_IF_NEEDED HEATER={printer.toolhead.extruder} RANGE=2    
    M109 R{km.start_extruder_probing_temp}
    {% else %}
      M104 S{HOTEND} # set the final extruder target temperature
    {% endif %}
    CUT_FILAMENT_1      #切断耗材


    {% if km.start_z_tilt_adjust_at_temp %}
      Z_TILT_ADJUST
    {% endif %}
    g29 #调平兼容G29

    _km_apply_print_offset SET=1   #加载保存的zoffset

  {% endif %}
  PRINT_START_SET PRINT_START_PHASE="extruder"

# =============================================================================
# 阶段5: 挤出机最终预热阶段
# =============================================================================
# 核心功能: 挤出机温度最终稳定化并进入打印状态
[gcode_macro _print_start_phase_extruder]
description: Inserted by slicer at start of print. Preheats the extruder.
  Usage: See PRINT_START.
gcode:
  _PRINT_START_PHASE_CHECK PHASE=extruder                         # 验证阶段状态
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set HOTEND = print.HOTEND|default(print.HOTEND_TEMP)|float %} # 获取挤出机目标温度
  {% set CHAMBER = print.CHAMBER|default(0)|int %}                  # 腔体温度  
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set Polar_cooler = printer.save_variables.variables.enable_polar_cooler|default(0) %}

  {% if CHAMBER == 0 %}
    M106 P3 S255
  {% endif %}

  M106 P4 S{Polar_cooler}                    #根据设置开启空调
  M106 S{HOTEND}
  #_KM_PARK_IF_NEEDED HEATER={printer.toolhead.extruder} RANGE=ABOVE    # 低于温度停放
  G1 X380 Y5  F30000
  M109 S{HOTEND}                                               # 等待挤出机达目标温度
  ENABLE_ALL_SENSOR                                             #开启所有传感器
  PRINT_START_SET PRINT_START_PHASE="printing"                    # 设置阶段为打印

# =============================================================================

# 用法: _KM_PARK_IF_NEEDED HEATER=<加热器> RANGE=[<百分比>|ABOVE|BELOW]
[gcode_macro _km_park_if_needed]
description: Parks the extruder if the current temperature of the supplied
  heater is not within the specified target range.
  Usage: _KM_PARK_IF_NEEDED HEATER=<heater> RANGE=[<percentage>|ABOVE|BELOW]
gcode:
  # === 加热器和范围参数解析 ===
  # 注意: 必须作为单独的宏调用以获取实时温度
  {% set HEATER = params.HEATER if params.HEATER in
                    printer.heaters.available_heaters else
                  ("heater_generic " ~ params.HEATER) %}           # 自动识别加热器类型
  {% set RANGE = (params.RANGE|default(1))|string|upper %}         # 范围参数(默认1%)

  # === 温度条件判断和停放决策 ===
  {% if printer[HEATER].target %}                                 # 如果加热器有目标温度
    {% if RANGE == "ABOVE" %}                                     # ABOVE模式: 温度低于目标时停放
      {% if printer[HEATER].temperature < printer[HEATER].target %}
        PARK                                                     # 执行停放
      {% endif %}
    {% elif RANGE == "BELOW" %}                                  # BELOW模式: 温度高于目标时停放
      {% if printer[HEATER].temperature > printer[HEATER].target %}
        PARK                                                     # 执行停放
      {% endif %}
    {% elif (printer[HEATER].temperature - printer[HEATER].target)|abs >
             (printer[HEATER].target * RANGE|float * 0.01)|abs %}  # 百分比模式: 误差超过百分比时停放
      PARK                                                       # 执行停放
    {% endif %}
  {% endif %}




#打印Z_OFFSET管理宏
[gcode_macro _km_apply_print_offset]          
variable_offset: []                                              # 存储当前偏移值的变量
gcode:
  {% if params.RESET|default(0)|int %}
    # SAVE_VARIABLE VARIABLE=z_offset VALUE=0
    SET_GCODE_OFFSET Z=0 MOVE=0
  {% elif params.SET|default(0)|int %}
    {% set z = printer.save_variables.variables.z_offset|default(0) %}
    SET_GCODE_OFFSET Z={z} MOVE=0
  {% elif params.SAVE|default(0)|int %}
    {% if printer.gcode_move.homing_origin.z < 0.5 %}
       SAVE_VARIABLE VARIABLE=z_offset VALUE={printer.gcode_move.homing_origin.z}
    {% endif %}
  {% endif %}



# =============================================================================
# 打印参数存储宏 - 用于在各阶段之间传递和存储参数
# =============================================================================
# 核心功能: 为所有PRINT_START阶段提供持久化的参数存储
# 用法: PRINT_START_SET <变量>=<值>
[gcode_macro print_start_set]
description: Inserted by slicer to set values used by PRINT_START.
  Usage: PRINT_START_SET <VARIABLE>=<value>
variable_print: {}                                               # 存储所有打印参数的字典
gcode:
  # === 动态设置参数 ===
  {%for k in params %}                                           # 遍历所有传入的参数
    {% set dummy = print.__setitem__(k|upper, params[k]) %}      # 将参数名转为大写并存储
  {% endfor %}

# =============================================================================
# 阶段状态检查宏 - 验证打印启动阶段的正确性和顺序
# =============================================================================
# 核心功能: 确保打印阶段按预期顺序执行，防止阶段错误和乱序
[gcode_macro _print_start_phase_check]
gcode:
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set PRINT_START_PHASE = print.PRINT_START_PHASE|default("none") %}
  {% if PRINT_START_PHASE != params.PHASE %}
    # Reset the phases manually just to be sure.
    SET_GCODE_VARIABLE MACRO=print_start_set VARIABLE=print VALUE="{{}}"
    {% if params.PHASE != 'none' %}
      {% set error = "PRINT_START phase error. Expected '%s' but found '%s'" %
                       (params.PHASE, PRINT_START_PHASE) %}
      # Do the cancel manually if we're not confident it will fire.
      {% if not 'virtual_sdcard' in printer or
            not printer.virtual_sdcard.is_active or 'CANCEL_PRINT' not in
              printer.configfile.settings.virtual_sdcard.on_error_gcode|
                default("")|upper %}
        {action_respond_info(error)}
        CANCEL_PRINT
      {% else %}
        {action_raise_error(error)}
      {% endif %}
    {% else %}
      { action_respond_info("Expected phase '%s' but found '%s'. Resetting."
                             % (params.PHASE, PRINT_START_PHASE)) }
    {% endif %}
  {% endif %}

# =============================================================================
# 打印结束主流程 - 切片器调用的入口点
# =============================================================================
# 核心功能: 安全关闭所有系统并恢复初始状态
# - 清理打印头和床面
# - 关闭所有加热器和风扇
# - 禁用步进电机和传感器
# - 清除所有打印状态和设置
[gcode_macro print_end]
description: Inserted by slicer at end of print.
  Usage: PRINT_END
gcode:
  _KM_CHECK_IS_PRINTING                                          # 验证正在打印状态
  M400                                                           # 等待所有动作完成
  _PRINT_END_INNER                                               # 执行内部结束流程

  {% set km = printer["gcode_macro _km_globals"] %}

  # === 重置所有调整参数 ===
  {% if km.start_clear_adjustments_at_end != 0 %}               # 如果配置了清除调整

    RESET_FAN_SCALING                                            # 重置风扇缩放
    M220 S100                                                    # 重置速度倍率为100%
    M221 S100                                                    # 重置流量倍率为100%
  {% endif %}
  # === 系统复位和关闭 ===
  _RESET_LAYER_GCODE                                             # 重置层代码系统
  _RESET_VELOCITY_LIMITS                                         # 重置速度限制
  TURN_OFF_HEATERS                                               # 关闭所有加热器
  M107                                                           # 关闭主风扇
  M106 P2 S0                                                     # 关闭辅助风扇2
  #M106 P3 S0                                                     # 关闭辅助风扇3
  M106 P4 S0                                                     # 关闭空调

  {% if printer.bed_mesh %}BED_MESH_CLEAR{% endif %}             # 清除床网数据
  G31

  # === 步进电机和传感器控制 ===
  # M84 ; 禁用所有步进电机(被替代为精细控制)
  M84
  DISABLE_ALL_SENSOR                                             # 禁用所有传感器

  {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 and printer["box_extras"]%}
    BUFFER_MONITORING ENABLE=0
  {% endif %}     ####缓冲器
  # === 清除打印状态和设置 ===
  CLEAR_PAUSE                                                    # 清除暂停状态
  _KM_BEEP_IF_AVAILABLE BEEPS=10                                 #结束打印声音提示
  SET_GCODE_VARIABLE MACRO=print_start_set VARIABLE=print VALUE="{{}}" # 清除打印参数
  SET_PRINT_MAIN_STATUS MAIN_STATUS=ready                       # 设置主状态为就绪
  # # === 文件系统清理 ===
  # SDCARD_RESET_FILE                                              # 重置SD卡文件状态
  # CLEAR_LAST_FILE                                                # 清除上次打印文件记录

# =============================================================================
# 内部打印结束流程 - 处理清理和停放动作
# =============================================================================
[gcode_macro _print_end_inner]
variable_cancelled: False                                        # 取消标志变量
gcode:
  SET_GCODE_VARIABLE MACRO=_print_end_inner VARIABLE=cancelled VALUE="{False}" # 重置取消标志
  # === 获取系统参数 ===
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set toolhead = printer.toolhead %}
  {% set origin = printer.gcode_move.homing_origin%}             # 归位原点
  # === 计算最大移动范围 ===
  {% set max_x = km.print_max[0] - origin.x %}                   # X轴最大位置
  {% set max_y = km.print_max[1] - origin.y %}                   # Y轴最大位置
  {% set max_z = toolhead.axis_maximum.z - origin.z %}           # Z轴最大位置

  # === 状态更新 ===
  {% if not cancelled %}                                         # 如果不是取消打印
    SET_PRINT_MAIN_STATUS MAIN_STATUS=print_completing          # 设置主状态
  {% endif %}
  _KM_APPLY_PRINT_OFFSET SAVE=1                         #先保存
  _KM_APPLY_PRINT_OFFSET RESET=1                         # 移除打印位置偏移




# =============================================================================
# 打印状态检查宏 - 验证当前是否在打印
# =============================================================================
[gcode_macro _km_check_is_printing]
variable_debug_state: False                                      # 调试模式(禁用状态检查)
description: Throws an error if print is not currently in progress.
gcode:
  # === 多重打印状态检查 ===
  {% if not debug_state and
        printer.idle_timeout.state|string != "Printing" and         # 空闲超时状态不是打印
        not (printer.virtual_sdcard|default({})).is_active|default(False) and # 虚拟SD卡未激活
        not printer.pause_resume.is_paused %}                       # 暂停恢复未激活
    { action_raise_error("No active print.") }                     # 抛出错误: 无活动打印
  {% endif %}

# =============================================================================
# 打印边界检查和设置宏 - 验证所有打印边界并缓存值
# =============================================================================
# 核心功能: 验证MESH和MODEL边界在安全范围内，设置打印限制
[gcode_macro _km_check_and_set_print_bounds]
description: Validates all print bounds and caches their values.
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set print = printer["gcode_macro print_start_set"].print %}

  # === 检查网格边界 ===
  {% if print.MESH_MIN %}                                          # 如果指定了网格范围
    {% set MESH_MIN = print.MESH_MIN.split(",")|map('float')|list %}  # 解析最小网格范围
    {% set MESH_MAX = print.MESH_MAX.split(",")|map('float')|list %}  # 解析最大网格范围
    # === 网格范围安全性验证 ===
    {%if MESH_MIN[0] < km.print_min[0] or MESH_MIN[1] < km.print_min[1] %}
      {action_raise_error("MESH_MIN %s is outside the printable bounds %s" %
                            (MESH_MIN|string, km.print_min|string))}    # 网格最小值超出边界
    {%elif MESH_MAX[0] > km.print_max[0] or MESH_MAX[1] > km.print_max[1] %}
      {action_raise_error("MESH_MAX %s is outside the printable bounds %s" %
                            (MESH_MAX|string, km.print_max|string))}    # 网格最大值超出边界
    {% endif %}
  {% endif %}

  # === 查找所有模型边界(包括传入的边界) ===
  {% set points = [] %}                                            # 初始化点集合
  {% if print.MODEL_MIN or print.MODEL_MAX %}                      # 如果指定了模型边界
    {% set MODEL_MIN = print.MODEL_MIN.split(",")|map('float')|list %} # 解析模型最小范围
    {% set MODEL_MAX = print.MODEL_MAX.split(",")|map('float')|list %} # 解析模型最大范围
    {% set points = [MODEL_MIN, MODEL_MAX] %}                     # 设置初始点集
  {% endif %}
  # === 从排除对象系统获取边界 ===
  {% if (printer.exclude_object|default({})).objects %}           # 如果启用了排除对象功能
    {% set points = printer.exclude_object.objects|selectattr('polygon')|
                      map(attribute='polygon')|sum(start=points) %} # 收集所有对象的多边形点
    {% set points_len = points|length %}                          # 获取点数量
    {% if points_len >= 2 %}                                      # 如果有足够的点
      {% set x_coords = (points|map(attribute=0)|sort|list)[0::points_len-1] %} # 获取X坐标最小最大值
      {% set y_coords = (points|map(attribute=1)|sort|list)[0::points_len-1] %} # 获取Y坐标最小最大值
      {% set MODEL_MIN = (x_coords[0],y_coords[0])|map('float')|list %} # 计算模型最小边界
      {% set MODEL_MAX = (x_coords[1],y_coords[1])|map('float')|list %} # 计算模型最大边界
      PRINT_START_SET MODEL_MIN="{MODEL_MIN|join(',')
                   }" MODEL_MAX="{MODEL_MAX|join(',')}"      # 保存计算出的模型边界
    {% endif %}
  {% endif %}

  # === 模型边界安全性验证 ===
  {% if MODEL_MIN %}                                               # 如果有模型边界数据
    {% if MODEL_MIN[0] < km.print_min[0] or MODEL_MIN[1] < km.print_min[1] %}
      {action_raise_error("MODEL_MIN %s is outside the printable bounds %s" %
                            (MODEL_MIN|string, km.print_min|string))} # 模型最小值超出边界
    {% elif MODEL_MAX[0] > km.print_max[0] or MODEL_MAX[1] > km.print_max[1] %}
      {action_raise_error("MODEL_MAX %s is outside the printable bounds %s" %
                            (MODEL_MAX|string, km.print_max|string))} # 模型最大值超出边界
    {% endif %}
  {% endif %}

  # === 设置最终打印限制 ===
  {% if MESH_MIN and MODEL_MIN %}                                 # 如果同时有网格和模型边界
    # 取两者的并集: 最小值取更小的，最大值取更大的
    PRINT_START_SET PRINT_MIN="{((MODEL_MIN[0],MESH_MIN[0])|min,
                                 (MODEL_MIN[1],MESH_MIN[1])|min)|join(',')
                  }" PRINT_MAX="{((MODEL_MAX[0],MESH_MAX[0])|max,
                                  (MODEL_MAX[1],MESH_MAX[1])|max)|join(',')}"
  {% else %}                                                     # 否则使用默认打印范围
    PRINT_START_SET PRINT_MIN="{km.print_min|join(',')
                 }" PRINT_MAX="{km.print_max|join(',')}"        # 使用全局配置的打印范围
  {% endif %}
